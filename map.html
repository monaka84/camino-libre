    .v2-dropdown::after {

    @media (max-width: 768px) {
      .v2-hamburger { display: flex; }
      .v2-nav {
        position: fixed; top: 64px; left: 0; right: 0; bottom: 0;
        background: #fff;
        flex-direction: column; align-items: stretch;
        gap: 0; padding: 1rem 0;
        overflow-y: auto;
        transform: translateY(-100vh);
        transition: transform 0.3s ease;
        z-index: 99;
      }
      .v2-header.menu-open .v2-nav { transform: translateY(0); }
      .v2-nav > a, .v2-nav .dropdown-trigger {

        padding: 1rem 2rem;
        font-size: 1rem;
        text-align: left;
        border-bottom: 1px solid var(--border);
        width: 100%;
      }

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script src="js/spots.js?v=20260427d"></script>
<script>
  (function () {
    var map = L.map('map', { worldCopyJump: true }).setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19
    }).addTo(map);

    var spots = window.SPOTS || [];
    if (!spots.length) return;

    var cluster = L.markerClusterGroup({
      maxClusterRadius: 50,
      showCoverageOnHover: false
    });
    var bounds = L.latLngBounds([]);

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    spots.forEach(function (s) {
      var html =
        '<div class="spot-popup-name">' + escapeHtml(s.name) + '</div>' +
        (s.detail ? '<div class="spot-popup-detail">' + escapeHtml(s.detail) + '</div>' : '') +
        '<a class="spot-popup-link" href="articles/' + encodeURIComponent(s.article) + '">📖 ' + escapeHtml(s.articleTitle) + '</a>';
      var marker = L.marker([s.lat, s.lng]).bindPopup(html, { maxWidth: 280 });
      cluster.addLayer(marker);
      bounds.extend([s.lat, s.lng]);
    });

    map.addLayer(cluster);
    if (bounds.isValid()) {
      map.fitBounds(bounds, { padding: [40, 40] });
    }
  })();
</script>
